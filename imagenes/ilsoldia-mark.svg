<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="dropGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0C869"/>
      <stop offset="22%" stop-color="#D9A24B"/>
      <stop offset="48%" stop-color="#9B5C8A"/>
      <stop offset="75%" stop-color="#5C2D80"/>
      <stop offset="100%" stop-color="#3C0C54"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3C0C54"/>
      <stop offset="55%" stop-color="#9B7CAE"/>
      <stop offset="100%" stop-color="#5C2D80"/>
    </linearGradient>
    <radialGradient id="sheen" cx="35%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="100" cy="100" r="91" fill="none" stroke="url(#ringGrad)" stroke-width="2.5"/>

  <!-- destello ascendente: transformación / activación -->
  <g fill="#C9A9DE">
    <circle cx="100" cy="30" r="3.4"/>
    <circle cx="86" cy="40" r="2.1"/>
    <circle cx="115" cy="42" r="2.4"/>
  </g>

  <!-- gota / ampolleta: plasma separado, marca central -->
  <path transform="translate(35,25) scale(1.3)"
        d="M50,0 C75,35 95,55 95,75 A45,45 0 1,1 5,75 C5,55 25,35 50,0 Z"
        fill="url(#dropGrad)"/>
  <path transform="translate(35,25) scale(1.3)"
        d="M50,0 C75,35 95,55 95,75 A45,45 0 1,1 5,75 C5,55 25,35 50,0 Z"
        fill="url(#sheen)"/>

  <!-- línea de separación del plasma -->
  <path d="M67,108 Q100,116 133,108" fill="none" stroke="#FCFBFE" stroke-width="1.6" stroke-opacity="0.55" stroke-linecap="round"/>
</svg>
